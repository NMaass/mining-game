name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

env:
  GODOT_VERSION: "4.6.3"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/godot-bin
          key: godot-${{ env.GODOT_VERSION }}-linux

      - name: Download Godot ${{ env.GODOT_VERSION }} (headless-capable)
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/godot-bin
          URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          curl -sSL -o /tmp/godot.zip "$URL"
          unzip -o /tmp/godot.zip -d ~/godot-bin
          mv ~/godot-bin/Godot_v${GODOT_VERSION}-stable_linux.x86_64 ~/godot-bin/godot
          chmod +x ~/godot-bin/godot

      - name: Expose Godot on PATH
        run: echo "$HOME/godot-bin" >> "$GITHUB_PATH"

      - name: Import project (build class cache + GDExtensions)
        run: godot --headless --path . --import || true

      - name: Gate 1 — data integrity
        run: tools/validate_data.sh

      - name: Gate 2 — headless test suite
        run: tools/run_tests.sh tests

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gdunit-report
          path: reports/
          if-no-files-found: ignore
